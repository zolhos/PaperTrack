name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: papertrack-app/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: papertrack-app

      - name: Build Next.js app
        run: npm run build
        working-directory: papertrack-app
        env:
          NEXT_PUBLIC_SPOTIFY_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_SPOTIFY_CLIENT_ID || '381fcef8a3374cfab9d3cdb0dde7bccb' }}
          NEXT_PUBLIC_SPOTIFY_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_SPOTIFY_REDIRECT_URI || 'https://diegolhos.github.io/PaperTrack' }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: papertrack-app/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
